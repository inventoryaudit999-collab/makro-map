<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MAKRO MAP · แผนที่สาขาแม็คโครทั่วประเทศ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fa;--surface:#ffffff;--surface-2:#f7f9fc;--line:#e6eaf1;--line-2:#eef1f6;
  --txt:#1b2230;--txt-2:#5a6478;--txt-dim:#9aa3b5;--accent:#e2231a;--accent-soft:#fff0ef;
  --blue:#2563eb;--gold:#d99a00;--ok:#0f9d58;
  --shadow:0 1px 3px rgba(20,30,55,.06),0 8px 24px rgba(20,30,55,.06);
  --shadow-lg:0 12px 40px rgba(20,30,55,.14);--r:16px;--r-sm:11px;--r-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'IBM Plex Sans Thai','Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
.mono{font-family:'Space Mono',monospace}
button{font-family:inherit}
#app{display:flex;height:100vh;width:100vw;position:relative}

#sidebar{width:368px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;z-index:1000;transition:transform .32s cubic-bezier(.22,1,.36,1)}
.brand{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.brand .mk{width:42px;height:42px;border-radius:11px;background:var(--accent);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;box-shadow:0 6px 16px rgba(226,35,26,.28)}
.brand .mk svg{width:24px;height:24px}
.brand h1{font-size:18px;font-weight:700;letter-spacing:-.3px;line-height:1.1}
.brand p{font-size:11px;color:var(--txt-dim);margin-top:2px}

/* language switch */
.lang-sw{margin-left:auto;display:flex;background:var(--surface-2);border:1px solid var(--line);
  border-radius:999px;padding:3px;gap:2px}
.lang-sw button{border:none;background:none;font-size:11.5px;font-weight:600;padding:5px 10px;
  border-radius:999px;color:var(--txt-dim);cursor:pointer;transition:.16s}
.lang-sw button.active{background:var(--accent);color:#fff}

.nav{display:flex;padding:8px 12px 0;gap:4px;border-bottom:1px solid var(--line);align-items:center}
.nav button{flex:1;border:none;background:none;padding:11px 0 13px;font-size:12.5px;font-weight:600;
  color:var(--txt-dim);cursor:pointer;position:relative;transition:.18s;border-radius:8px 8px 0 0;white-space:nowrap}
.nav button:hover{color:var(--txt-2)}
.nav button.active{color:var(--accent)}
.nav button.active::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:3px;
  background:var(--accent);border-radius:3px 3px 0 0}

.pane{flex:1;display:flex;flex-direction:column;overflow:hidden}
.pane.hide{display:none}

.search-wrap{padding:14px 18px 8px;position:relative}
.search-wrap input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:12px 14px 12px 38px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
.search-wrap .si{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--txt-dim);pointer-events:none}

.regions{padding:4px 18px 8px;display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer;background:var(--surface-2);
  border:1px solid var(--line);color:var(--txt-2);transition:.16s;user-select:none;display:flex;align-items:center;gap:6px;font-weight:500}
.chip:hover{border-color:#cfd6e2}
.chip.active{color:#fff;border-color:transparent;font-weight:600}
.chip .cdot{width:8px;height:8px;border-radius:50%}

.list{flex:1;overflow-y:auto;padding:6px 14px 18px}
.list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:#dde3ec;border-radius:10px}
.branch{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 13px;
  margin-bottom:8px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.branch::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--bcol,var(--accent))}
.branch:hover{border-color:#cfd6e2;box-shadow:var(--shadow);transform:translateX(2px)}
.branch.routing-pick{border-color:var(--gold);box-shadow:0 0 0 2px rgba(217,154,0,.25)}
.branch .bn{font-size:14px;font-weight:600;display:flex;justify-content:space-between;gap:8px;align-items:center}
.branch .bn .code{font-size:10.5px;color:var(--txt-dim);background:var(--surface-2);padding:2px 7px;border-radius:6px;flex-shrink:0}
.branch .bp{font-size:12px;color:var(--txt-2);margin-top:4px;display:flex;align-items:center;gap:5px}
.branch .reg-tag{font-size:10px;padding:2px 9px;border-radius:999px;margin-top:8px;display:inline-block;font-weight:600}
.branch .seq{position:absolute;right:10px;top:10px;width:22px;height:22px;border-radius:50%;background:var(--gold);
  color:#fff;font-size:11px;font-weight:700;display:none;align-items:center;justify-content:center}
.branch.in-route .seq{display:flex}

#map{flex:1;background:#eaeef4;z-index:1}
.leaflet-container{background:#eaeef4;font-family:inherit}
.leaflet-popup-content-wrapper{background:#fff;color:var(--txt);border-radius:var(--r);box-shadow:var(--shadow-lg);padding:2px}
.leaflet-popup-content{margin:14px 16px;font-family:inherit}
.pop-name{font-size:16px;font-weight:700;margin-bottom:3px}
.pop-meta{font-size:12px;color:var(--txt-2);margin-bottom:8px}
.pop-coord{font-size:11.5px;color:var(--gold);margin-bottom:11px;font-weight:500}
.pop-addr{font-size:11.5px;color:var(--txt-2);margin-bottom:7px;line-height:1.5}
.pop-btns{display:flex;gap:7px;flex-wrap:wrap}
.pop-btns button{flex:1;min-width:78px;border:1px solid var(--line);background:var(--surface-2);color:var(--txt);
  font-size:11.5px;padding:8px;border-radius:8px;cursor:pointer;transition:.16s;font-weight:500}
.pop-btns button:hover{border-color:var(--accent);color:var(--accent);background:#fff}
.pop-btns button.gd{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ===== MARKER WITH LABEL ===== */
.mk-wrap{transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;cursor:pointer}
.mk-label{background:#fff;border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-size:11px;
  font-weight:600;color:var(--txt);white-space:nowrap;box-shadow:0 2px 6px rgba(20,30,55,.18);
  margin-bottom:2px;line-height:1.3;max-width:120px;overflow:hidden;text-overflow:ellipsis}
.mk-label .lb-code{color:var(--txt-dim);font-size:9px;font-weight:500;margin-right:3px}
.mk-pin svg{filter:drop-shadow(0 3px 5px rgba(20,30,55,.3))}
.mk-seq{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;background:var(--gold);
  color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
  border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ===== Route panel (simple 2-point) ===== */
#routebar{position:absolute;left:388px;top:18px;z-index:900;background:#fff;border:1px solid var(--line);
  border-radius:var(--r);padding:16px;width:330px;box-shadow:var(--shadow-lg);transition:.3s}
#routebar.hidden{opacity:0;transform:translateY(-12px);pointer-events:none}
.rb-title{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);font-weight:700;
  margin-bottom:13px;display:flex;align-items:center;gap:7px}
.rb-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;background:var(--surface-2);padding:9px 11px;border-radius:var(--r-xs)}
.rb-row .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.rb-row .dot.a{background:var(--gold)}.rb-row .dot.b{background:var(--accent)}
.rb-row .val{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rb-row .val.empty{color:var(--txt-dim);font-weight:400}
.rb-dist{margin-top:12px;padding:13px;background:var(--accent-soft);border-radius:var(--r-sm);display:flex;align-items:baseline;gap:8px}
.rb-dist .km{font-size:30px;font-weight:700;color:var(--accent)}
.rb-dist .u{font-size:14px;color:var(--txt-2)}
.rb-dist .straight{font-size:11px;color:var(--txt-dim);margin-left:auto}
.rb-actions{display:flex;gap:7px;margin-top:12px}
.rb-actions button{flex:1;font-size:12.5px;padding:10px;border-radius:var(--r-xs);cursor:pointer;
  border:1px solid var(--line);background:var(--surface-2);color:var(--txt);transition:.16s;font-weight:500}
.rb-actions button.gmap{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

.route-hint{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);z-index:900;background:var(--gold);
  color:#fff;font-weight:600;font-size:12.5px;padding:10px 20px;border-radius:999px;box-shadow:var(--shadow-lg);transition:.3s}
.route-hint.hidden{opacity:0;transform:translateX(-50%) translateY(10px);pointer-events:none}

.sync{margin-left:6px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt-dim);flex-shrink:0}
.sync .led{width:8px;height:8px;border-radius:50%;background:#cbd2de}
.sync.on .led{background:var(--ok);box-shadow:0 0 8px var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ===== Summary ===== */
.summary{flex:1;overflow-y:auto;padding:16px 18px 24px}
.summary::-webkit-scrollbar{width:8px}.summary::-webkit-scrollbar-thumb{background:#dde3ec;border-radius:10px}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;box-shadow:var(--shadow)}
.kpi .v{font-size:26px;font-weight:700;line-height:1}
.kpi .l{font-size:11.5px;color:var(--txt-2);margin-top:5px}
.kpi.red .v{color:var(--accent)}.kpi.blue .v{color:var(--blue)}.kpi.gold .v{color:var(--gold)}.kpi.green .v{color:var(--ok)}
.sum-sec{margin-top:18px}
.sum-sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--txt-dim);font-weight:700;margin-bottom:10px}
.bar-row{margin-bottom:11px;cursor:pointer}
.bar-row:hover .bar-label{color:var(--accent)}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;font-weight:500;transition:.15s}
.bar-label .n{color:var(--txt-2);font-weight:600}
.bar-track{height:10px;background:var(--surface-2);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.print-btn{width:100%;margin-top:18px;padding:13px;border-radius:var(--r-sm);border:none;background:var(--txt);
  color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;transition:.16s;display:flex;align-items:center;justify-content:center;gap:8px}
.print-btn:hover{background:#000}

/* ===== Route-plan pane (multi stop) ===== */
.rp{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rp-head{padding:14px 18px 6px}
.rp-head p{font-size:12px;color:var(--txt-2);line-height:1.5}
.rp-total{margin:10px 18px 4px;background:var(--accent-soft);border-radius:var(--r-sm);padding:13px 15px;
  display:flex;align-items:baseline;gap:8px}
.rp-total .v{font-size:28px;font-weight:700;color:var(--accent)}
.rp-total .u{font-size:13px;color:var(--txt-2)}
.rp-total .legs{font-size:11px;color:var(--txt-dim);margin-left:auto}
.rp-list{flex:1;overflow-y:auto;padding:10px 14px 14px}
.rp-list::-webkit-scrollbar{width:8px}.rp-list::-webkit-scrollbar-thumb{background:#dde3ec;border-radius:10px}
.rp-stop{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:11px 12px;margin-bottom:6px;position:relative}
.rp-stop .num{width:26px;height:26px;border-radius:50%;background:var(--gold);color:#fff;font-size:12px;
  font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rp-stop .info{flex:1;min-width:0}
.rp-stop .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rp-stop .pv{font-size:11px;color:var(--txt-2)}
.rp-stop .rm{border:none;background:none;color:var(--txt-dim);cursor:pointer;font-size:17px;padding:2px 4px;line-height:1}
.rp-stop .rm:hover{color:var(--accent)}
.rp-leg{font-size:11px;color:var(--gold);font-weight:600;padding:3px 0 3px 38px;display:flex;align-items:center;gap:6px}
.rp-empty{text-align:center;color:var(--txt-dim);font-size:13px;padding:40px 20px;line-height:1.6}
.rp-actions{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:8px}
.rp-actions button{flex:1;padding:11px;border-radius:var(--r-xs);font-size:12.5px;font-weight:600;cursor:pointer;
  border:1px solid var(--line);background:var(--surface-2);color:var(--txt);transition:.16s}
.rp-actions button.gmap{background:var(--accent);border-color:var(--accent);color:#fff}
.rp-actions button:disabled{opacity:.4;cursor:not-allowed}

.legend{background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;box-shadow:var(--shadow);font-size:12px}
.legend .lt{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt-dim);margin-bottom:8px}
.legend .li{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:var(--txt-2)}
.legend .li .d{width:10px;height:10px;border-radius:50%}

#mtoggle{display:none;position:absolute;top:14px;left:14px;z-index:1100;width:48px;height:48px;border-radius:13px;
  background:var(--accent);border:none;color:#fff;font-size:21px;cursor:pointer;box-shadow:0 6px 18px rgba(226,35,26,.4);
  align-items:center;justify-content:center}
#scrim{display:none;position:absolute;inset:0;background:rgba(20,30,55,.4);z-index:999}

@media(max-width:880px){
  #sidebar{position:absolute;top:0;left:0;bottom:0;width:90%;max-width:380px;transform:translateX(-100%);box-shadow:var(--shadow-lg)}
  #sidebar.open{transform:translateX(0)}
  #mtoggle{display:flex}#scrim.show{display:block}
  #routebar{left:14px;right:14px;width:auto;top:74px}
  .route-hint{font-size:11.5px;padding:9px 16px;bottom:18px}
  .mk-label{max-width:90px;font-size:10px}
}
@media print{#sidebar,#mtoggle,#routebar,.route-hint,#loginOverlay{display:none!important}}
.leg-tip{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important}
.leg-tip::before{display:none!important}

/* ===== LOGIN ===== */
#loginOverlay{position:fixed;inset:0;z-index:3000;background:linear-gradient(135deg,#f4f6fa,#e9edf5);
  display:flex;align-items:center;justify-content:center;padding:20px}
#loginOverlay.hide{display:none}
.login-card{background:#fff;border-radius:22px;box-shadow:0 24px 70px rgba(20,30,55,.18);
  padding:38px 34px;width:100%;max-width:380px;position:relative;overflow:hidden}
.login-card::before{content:"";position:absolute;top:-60px;right:-60px;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(226,35,26,.12),transparent 70%)}
.login-logo{width:58px;height:58px;border-radius:15px;background:var(--accent);display:flex;align-items:center;
  justify-content:center;margin-bottom:18px;box-shadow:0 8px 22px rgba(226,35,26,.3)}
.login-logo svg{width:32px;height:32px}
.login-card h2{font-size:22px;font-weight:700;letter-spacing:-.4px}
.login-card .sub{font-size:12.5px;color:var(--txt-dim);margin-top:4px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:6px}
.field input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;
  padding:13px 14px;font-family:inherit;font-size:14px;color:var(--txt);outline:none;transition:.2s}
.field input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
.login-btn{width:100%;margin-top:8px;padding:14px;border:none;border-radius:12px;background:var(--accent);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.16s}
.login-btn:hover{background:#c41e16}
.login-err{color:var(--accent);font-size:12.5px;margin-top:12px;text-align:center;min-height:16px;font-weight:500}
.login-lang{position:absolute;top:18px;right:18px;display:flex;gap:4px}
.login-lang button{border:1px solid var(--line);background:#fff;font-size:11px;font-weight:600;padding:4px 8px;
  border-radius:8px;color:var(--txt-dim);cursor:pointer}
.login-lang button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.userbox{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--txt-2);padding:0 4px}
.userbox .av{width:24px;height:24px;border-radius:7px;background:var(--accent);color:#fff;font-size:12px;
  font-weight:700;display:flex;align-items:center;justify-content:center}
.logout-btn{border:1px solid var(--line);background:var(--surface-2);font-size:11px;font-weight:600;padding:5px 9px;
  border-radius:8px;color:var(--txt-2);cursor:pointer;transition:.15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ===== SAVED RECORDS ===== */
.saved{flex:1;display:flex;flex-direction:column;overflow:hidden}
.saved-head{padding:14px 18px 8px;display:flex;align-items:center;gap:8px}
.saved-head .cnt{font-size:12px;color:var(--txt-2)}
.saved-head .exp{margin-left:auto;border:1px solid var(--ok);background:#e9f7ef;color:var(--ok);font-size:12px;
  font-weight:600;padding:7px 12px;border-radius:9px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.saved-head .exp:hover{background:var(--ok);color:#fff}
.saved-head .exp:disabled{opacity:.4;cursor:not-allowed}
.saved-list{flex:1;overflow-y:auto;padding:8px 14px 18px}
.saved-list::-webkit-scrollbar{width:8px}.saved-list::-webkit-scrollbar-thumb{background:#dde3ec;border-radius:10px}
.rec{background:#fff;border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 13px;margin-bottom:8px;position:relative}
.rec .rt{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:600}
.rec .rt .km{margin-left:auto;color:var(--accent);font-weight:700}
.rec .rmeta{font-size:11px;color:var(--txt-dim);margin-top:5px}
.rec .ops{position:absolute;right:10px;bottom:10px;display:flex;gap:6px}
.rec .ops button{border:1px solid var(--line);background:var(--surface-2);font-size:11px;padding:4px 9px;
  border-radius:7px;cursor:pointer;color:var(--txt-2);transition:.15s}
.rec .ops button.ed:hover{border-color:var(--blue);color:var(--blue)}
.rec .ops button.dl:hover{border-color:var(--accent);color:var(--accent)}
.saved-empty{text-align:center;color:var(--txt-dim);font-size:13px;padding:40px 20px;line-height:1.6}
.save-cur{margin:6px 18px;padding:12px 14px;background:var(--accent-soft);border-radius:var(--r-sm);
  display:flex;align-items:center;gap:10px}
.save-cur .txt{font-size:12.5px;flex:1;font-weight:500}
.save-cur .txt b{color:var(--accent)}
.save-cur button{border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:8px 13px;
  border-radius:9px;cursor:pointer}
.save-cur.hide{display:none}

/* edit modal */
.modal{position:fixed;inset:0;z-index:2500;background:rgba(20,30,55,.45);display:none;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-card{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);padding:24px;width:100%;max-width:360px}
.modal-card h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-card .field input{font-size:14px}
.modal-actions{display:flex;gap:8px;margin-top:8px}
.modal-actions button{flex:1;padding:11px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--surface-2)}
.modal-actions button.save{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="loginOverlay">
  <div class="login-card">
    <div class="login-lang" id="loginLang">
      <button data-lang="th" class="active">ไทย</button>
      <button data-lang="en">EN</button>

   STATE
============================================================ */
let DATA=JSON.parse(JSON.stringify(DEFAULT_BRANCHES));
let RECORDS=[];           // saved distance logs
let activeRegion='all',searchTerm='',currentPane='map';
let fbReady=false,db=null;

/* ============================================================
   LOGIN
============================================================ */
function showApp(){document.getElementById('loginOverlay').classList.add('hide');setTimeout(()=>map.invalidateSize(),100);}
function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(u===AUTH_USER&&p===AUTH_PASS){
    document.getElementById('loginErr').textContent='';
    document.getElementById('userName').textContent=u;
    document.getElementById('userAv').textContent=u.charAt(0).toUpperCase();
    showApp();
  }else{
    document.getElementById('loginErr').textContent=t('loginErr');
  }
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
document.getElementById('logoutBtn').onclick=()=>{location.reload();};

/* ============================================================
   MAP
============================================================ */
const map=L.map('map',{zoomControl:false,attributionControl:false}).setView([13.2,100.9],6);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(map);

let legendCtl;
function addLegend(){
  if(legendCtl)map.removeControl(legendCtl);
  const Legend=L.Control.extend({options:{position:'bottomleft'},onAdd:function(){
    const d=L.DomUtil.create('div','legend');let h=`<div class="lt">${t('legendT')}</div>`;
    for(const k of Object.keys(REGIONS))h+=`<div class="li"><span class="d" style="background:${REGIONS[k].color}"></span>${regName(k)}</div>`;
    d.innerHTML=h;L.DomEvent.disableClickPropagation(d);return d;
  }});legendCtl=new Legend();map.addControl(legendCtl);
}
let markers={};
function pinSVG(c){return `<svg width="26" height="34" viewBox="0 0 26 34"><path d="M13 0C5.8 0 0 5.8 0 13c0 9.5 13 21 13 21s13-11.5 13-21C26 5.8 20.2 0 13 0z" fill="${c}"/><circle cx="13" cy="13" r="5" fill="#fff"/></svg>`;}
function markerHTML(b){
  const col=(REGIONS[b.region]||{}).color||'#e2231a';
  const seq=routeStops.indexOf(b.code);
  const sb=seq>=0?`<div class="mk-seq">${seq+1}</div>`:'';
  return `<div class="mk-wrap" style="position:relative"><div class="mk-label"><span class="lb-code">${b.code}</span>${bName(b)}</div><div class="mk-pin">${pinSVG(col)}</div>${sb}</div>`;
}
function buildMarkers(){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  DATA.forEach(b=>{
    const icon=L.divIcon({className:'',html:markerHTML(b),iconSize:[120,52],iconAnchor:[13,52]});
    const m=L.marker([b.lat,b.lng],{icon}).addTo(map);
    m.bindPopup(popupHTML(b),{closeButton:true});
    m.on('click',()=>onMarkerClick(b));markers[b.code]=m;
  });
}
function refreshMarker(code){
  const b=DATA.find(x=>x.code===code);if(!b||!markers[code])return;
  markers[code].setIcon(L.divIcon({className:'',html:markerHTML(b),iconSize:[120,52],iconAnchor:[13,52]}));
}
function popupHTML(b){
  return `<div><div class="pop-name">${t('branchOf')} ${bName(b)}</div>
    <div class="pop-meta">${t('code')} ${b.code} · ${b.prov||''} · ${regName(b.region)}</div>
    ${b.addr?`<div class="pop-addr">📍 ${b.addr}</div>`:''}
    <div class="pop-coord mono">◉ ${(+b.lat).toFixed(5)}, ${(+b.lng).toFixed(5)}</div>
    <div class="pop-btns">
      <button onclick="setRoutePoint('${b.code}','a')">${t('setA')}</button>
      <button onclick="setRoutePoint('${b.code}','b')">${t('setB')}</button>
      <button onclick="addStop('${b.code}')">${t('addRoute')}</button>
      <button class="gd" onclick="openGmap(${b.lat},${b.lng})">${t('nav')}</button>
    </div></div>`;
}
function onMarkerClick(b){if(currentPane==='route'){addStop(b.code);return;}if(routeMode){handleRoutePick(b);}}

/* ============================================================
   FILTER + LIST
============================================================ */
function getFiltered(){
  return DATA.filter(b=>{
    const okR=activeRegion==='all'||b.region===activeRegion;
    const term=searchTerm.trim().toLowerCase();
    const okS=!term||bName(b).toLowerCase().includes(term)||b.name.toLowerCase().includes(term)||
      (b.name_en||'').toLowerCase().includes(term)||(b.prov||'').toLowerCase().includes(term)||
      (b.addr||'').toLowerCase().includes(term)||(b.code||'').toLowerCase().includes(term);
    return okR&&okS;});
}
function renderRegions(){
  const wrap=document.getElementById('regions');
  let html=`<div class="chip ${activeRegion==='all'?'active':''}" data-r="all" style="${activeRegion==='all'?'background:#1b2230':''}"><span class="cdot" style="background:#1b2230"></span>${t('all')}</div>`;
  for(const k of Object.keys(REGIONS)){const act=activeRegion===k;
    html+=`<div class="chip ${act?'active':''}" data-r="${k}" style="${act?'background:'+REGIONS[k].color:''}"><span class="cdot" style="background:${REGIONS[k].color}"></span>${regName(k)}</div>`;}
  wrap.innerHTML=html;
  wrap.querySelectorAll('.chip').forEach(c=>{c.onclick=()=>{activeRegion=c.dataset.r;renderRegions();renderList();if(activeRegion!=='all')zoomToRegion(activeRegion);};});
}
function renderList(){
  const fil=getFiltered();
  DATA.forEach(b=>{const show=fil.includes(b),el=markers[b.code]&&markers[b.code].getElement();if(el)el.style.display=show?'':'none';});
  const list=document.getElementById('list');
  list.innerHTML=fil.map(b=>{
    const reg=REGIONS[b.region]||{color:'#999'};
    const pick=(routeA&&routeA.code===b.code)||(routeB&&routeB.code===b.code);
    const inR=routeStops.includes(b.code);
    return `<div class="branch ${pick?'routing-pick':''} ${inR?'in-route':''}" data-c="${b.code}" style="--bcol:${reg.color}">
      <div class="seq">${inR?routeStops.indexOf(b.code)+1:''}</div>
      <div class="bn"><span>${bName(b)}</span><span class="code mono">${b.code}</span></div>
      <div class="bp">📍 ${b.prov?b.prov:regName(b.region)}</div>
      <span class="reg-tag" style="background:${reg.color}1a;color:${reg.color}">${regName(b.region)}</span>
    </div>`;
  }).join('')||`<div style="color:var(--txt-dim);text-align:center;padding:36px;font-size:13px">${t('notFound')}</div>`;
  list.querySelectorAll('.branch').forEach(el=>{el.onclick=()=>{
    const b=DATA.find(x=>x.code===el.dataset.c);
    if(currentPane==='route'){addStop(b.code);return;}
    if(routeMode){handleRoutePick(b);return;}
    map.flyTo([b.lat,b.lng],13,{duration:.8});markers[b.code].openPopup();closeMobile();};});
}
function zoomToRegion(r){const pts=DATA.filter(b=>b.region===r).map(b=>[b.lat,b.lng]);if(pts.length)map.flyToBounds(L.latLngBounds(pts).pad(.15),{duration:.7});}
document.getElementById('search').addEventListener('input',e=>{searchTerm=e.target.value;renderList();});

function haversine(a,b){const R=6371,r=x=>x*Math.PI/180;const dLat=r(b.lat-a.lat),dLng=r(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(r(a.lat))*Math.cos(r(b.lat))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));}

/* ============================================================
   2-POINT MEASURE
============================================================ */
let routeMode=false,routeA=null,routeB=null,routeLine=null;
window.setRoutePoint=(code,which)=>{const b=DATA.find(x=>x.code===code);if(which==='a')routeA=b;else routeB=b;map.closePopup();updateRoute();};
function handleRoutePick(b){if(!routeA||(routeA&&routeB)){routeA=b;routeB=null;}else if(!routeB){routeB=b;}updateRoute();}
function updateRoute(){
  document.getElementById('routebar').classList.remove('hidden');
  const aEl=document.getElementById('rbA'),bEl=document.getElementById('rbB');
  if(routeA){aEl.textContent=`${t('branchOf')} ${bName(routeA)}`;aEl.classList.remove('empty');}else{aEl.textContent=t('pickA');aEl.classList.add('empty');}
  if(routeB){bEl.textContent=`${t('branchOf')} ${bName(routeB)}`;bEl.classList.remove('empty');}else{bEl.textContent=t('pickB');bEl.classList.add('empty');}
  if(routeLine){map.removeLayer(routeLine);routeLine=null;}
  if(routeA&&routeB){
    document.getElementById('rbKm').textContent=haversine(routeA,routeB).toFixed(1);
    document.getElementById('rbStraight').textContent=t('straight');
    routeLine=L.polyline([[routeA.lat,routeA.lng],[routeB.lat,routeB.lng]],{color:'#d99a00',weight:3,dashArray:'8 9',opacity:.95}).addTo(map);
    map.fitBounds(routeLine.getBounds(),{padding:[90,90]});
  }else{document.getElementById('rbKm').textContent='—';document.getElementById('rbStraight').textContent='';}
  renderList();
}
window.openGmap=(lat,lng)=>window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`,'_blank');
document.getElementById('rbClear').onclick=()=>{routeA=routeB=null;if(routeLine){map.removeLayer(routeLine);routeLine=null;}updateRoute();};
document.getElementById('rbGmap').onclick=()=>{if(routeA&&routeB)window.open(`https://www.google.com/maps/dir/?api=1&origin=${routeA.lat},${routeA.lng}&destination=${routeB.lat},${routeB.lng}`,'_blank');else if(routeA)openGmap(routeA.lat,routeA.lng);};
document.getElementById('rbSave').onclick=()=>{
  if(routeA&&routeB){saveRecord([routeA.code,routeB.code]);flash(document.getElementById('rbSave'));}
};

let routeCtl;
function addRouteCtl(){
  if(routeCtl)map.removeControl(routeCtl);
  const RC=L.Control.extend({options:{position:'topright'},onAdd:function(){
    const d=L.DomUtil.create('div');
    d.innerHTML=`<button id="routeToggle" style="font-family:'IBM Plex Sans Thai','Noto Sans KR',sans-serif;font-size:13px;font-weight:600;padding:11px 15px;border-radius:12px;border:1px solid #e6eaf1;background:#fff;color:#1b2230;cursor:pointer;box-shadow:0 6px 18px rgba(20,30,55,.12)">${t('measureBtn')}</button>`;
    L.DomEvent.disableClickPropagation(d);d.querySelector('button').onclick=toggleRouteMode;return d;
  }});routeCtl=new RC();map.addControl(routeCtl);
}
function toggleRouteMode(){
  routeMode=!routeMode;
  const btn=document.getElementById('routeToggle'),hint=document.getElementById('routeHint');
  if(routeMode){btn.style.background='#e2231a';btn.style.borderColor='#e2231a';btn.style.color='#fff';btn.textContent=t('measuring');hint.classList.remove('hidden');document.getElementById('routebar').classList.remove('hidden');}
  else{btn.style.background='#fff';btn.style.borderColor='#e6eaf1';btn.style.color='#1b2230';btn.textContent=t('measureBtn');hint.classList.add('hidden');}
}
function flash(btn){const o=btn.textContent;btn.textContent=t('saved');setTimeout(()=>btn.textContent=o,1400);}

/* ============================================================
   MULTI-STOP ROUTE
============================================================ */
let routeStops=[],routeLines=[];
window.addStop=(code)=>{if(routeStops.includes(code))return;routeStops.push(code);refreshMarker(code);drawRoutePlan();renderRoutePlan();renderList();map.closePopup();};
function removeStop(code){routeStops=routeStops.filter(c=>c!==code);refreshMarker(code);routeStops.forEach(refreshMarker);drawRoutePlan();renderRoutePlan();renderList();}
window.removeStop=removeStop;
function drawRoutePlan(){
  routeLines.forEach(l=>map.removeLayer(l));routeLines=[];
  for(let i=0;i<routeStops.length-1;i++){
    const a=DATA.find(x=>x.code===routeStops[i]),b=DATA.find(x=>x.code===routeStops[i+1]);if(!a||!b)continue;
    const km=haversine(a,b),mid=[(a.lat+b.lat)/2,(a.lng+b.lng)/2];
    const line=L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{color:'#d99a00',weight:3.5,opacity:.9}).addTo(map);
    line.bindTooltip(L.tooltip({permanent:true,direction:'center',className:'leg-tip'}).setLatLng(mid)
      .setContent(`<span style="background:#d99a00;color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;box-shadow:0 2px 5px rgba(0,0,0,.25)">${km.toFixed(1)} ${t('km')}</span>`)).openTooltip();
    routeLines.push(line);
  }
  if(routeStops.length>=2){const pts=routeStops.map(c=>{const b=DATA.find(x=>x.code===c);return[b.lat,b.lng];});map.flyToBounds(L.latLngBounds(pts).pad(.2),{duration:.6});}
}
function routeTotalKm(){let tot=0;for(let i=0;i<routeStops.length-1;i++){const a=DATA.find(x=>x.code===routeStops[i]),b=DATA.find(x=>x.code===routeStops[i+1]);if(a&&b)tot+=haversine(a,b);}return tot;}
function renderRoutePlan(){
  const totalEl=document.getElementById('rpTotal'),legsEl=document.getElementById('rpLegs'),listEl=document.getElementById('rpList');
  const saveCur=document.getElementById('saveCur');
  if(routeStops.length===0){listEl.innerHTML=`<div class="rp-empty">${t('routeEmpty')}</div>`;totalEl.textContent='0';legsEl.textContent='';document.getElementById('rpGmap').disabled=true;saveCur.classList.add('hide');return;}
  let total=0,html='';
  routeStops.forEach((code,i)=>{
    const b=DATA.find(x=>x.code===code);if(!b)return;
    html+=`<div class="rp-stop"><div class="num">${i+1}</div><div class="info"><div class="nm">${bName(b)}</div><div class="pv">${t('code')} ${b.code} · ${regName(b.region)}</div></div><button class="rm" onclick="removeStop('${code}')">✕</button></div>`;
    if(i<routeStops.length-1){const nx=DATA.find(x=>x.code===routeStops[i+1]);const km=haversine(b,nx);total+=km;html+=`<div class="rp-leg">↓ ${km.toFixed(1)} ${t('km')}</div>`;}
  });
  listEl.innerHTML=html;totalEl.textContent=total.toFixed(1);
  legsEl.textContent=`${routeStops.length} ${t('stops')}`;
  document.getElementById('rpGmap').disabled=routeStops.length<2;
  if(routeStops.length>=2){saveCur.classList.remove('hide');
    document.getElementById('saveCurTxt').innerHTML=`${t('curRoute')}: <b>${total.toFixed(1)} ${t('km')}</b> · ${routeStops.length} ${t('stops')}`;}
  else saveCur.classList.add('hide');
}
document.getElementById('rpClear').onclick=()=>{const old=[...routeStops];routeStops=[];old.forEach(refreshMarker);drawRoutePlan();renderRoutePlan();renderList();};
document.getElementById('rpGmap').onclick=()=>{if(routeStops.length<2)return;
  const pts=routeStops.map(c=>{const b=DATA.find(x=>x.code===c);return `${b.lat},${b.lng}`;});
  let url=`https://www.google.com/maps/dir/?api=1&origin=${pts[0]}&destination=${pts[pts.length-1]}`;
  const way=pts.slice(1,-1).join('|');if(way)url+=`&waypoints=${way}`;window.open(url,'_blank');};
document.getElementById('saveCurBtn').onclick=()=>{if(routeStops.length>=2){saveRecord([...routeStops]);flash(document.getElementById('saveCurBtn'));}};

/* ============================================================
   SAVED RECORDS (with Firebase)
============================================================ */
function saveRecord(codes){
  const stops=codes.map(c=>{const b=DATA.find(x=>x.code===c);return{code:c,name:b?b.name:c,prov:b?b.prov:'',addr:b?b.addr:''};});
  let total=0,legs=[];
  for(let i=0;i<codes.length-1;i++){const a=DATA.find(x=>x.code===codes[i]),b=DATA.find(x=>x.code===codes[i+1]);
    if(a&&b){const km=haversine(a,b);total+=km;legs.push({from:a.name,to:b.name,km:+km.toFixed(2)});}}
  const rec={id:'rec_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    ts:Date.now(),stops,legs,totalKm:+total.toFixed(2),note:'',by:document.getElementById('userName').textContent};
  RECORDS.unshift(rec);
  persistRecords();renderSaved();
}
function persistRecords(){
  if(fbReady&&db){db.ref(DB_RECORDS).set(RECORDS).catch(e=>console.warn(e));}
  else ls_set('makro_records',JSON.stringify(RECORDS));
}
function loadLocalRecords(){try{const r=JSON.parse(ls_get('makro_records','[]'));if(Array.isArray(r))RECORDS=r;}catch(e){}}
function fmtDate(ts){const d=new Date(ts);const p=n=>String(n).padStart(2,'0');return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function renderSaved(){
  document.getElementById('savedCnt').textContent=`${RECORDS.length} ${t('records')}`;
  document.getElementById('exportBtn').disabled=RECORDS.length===0;
  const list=document.getElementById('savedList');
  if(RECORDS.length===0){list.innerHTML=`<div class="saved-empty">${t('savedEmpty')}</div>`;return;}
  list.innerHTML=RECORDS.map(r=>{
    const path=r.stops.map(s=>{const b=DATA.find(x=>x.code===s.code);return b?bName(b):s.name;}).join(' → ');
    return `<div class="rec">
      <div class="rt"><span>${path}</span><span class="km">${r.totalKm.toFixed(1)} ${t('km')}</span></div>
      <div class="rmeta">🕒 ${fmtDate(r.ts)} · 👤 ${r.by||'admin'}${r.note?' · 📝 '+r.note:''}</div>
      <div class="ops"><button class="ed" onclick="editRecord('${r.id}')">✏️ ${t('edit')}</button><button class="dl" onclick="delRecord('${r.id}')">🗑️ ${t('del')}</button></div>
    </div>`;
  }).join('');
}
window.delRecord=(id)=>{if(!confirm(t('confirmDel')))return;RECORDS=RECORDS.filter(r=>r.id!==id);persistRecords();renderSaved();};
let editingId=null;
window.editRecord=(id)=>{editingId=id;const r=RECORDS.find(x=>x.id===id);document.getElementById('editNote').value=r.note||'';document.getElementById('editModal').classList.add('show');};
document.getElementById('editCancel').onclick=()=>{document.getElementById('editModal').classList.remove('show');editingId=null;};
document.getElementById('editSave').onclick=()=>{const r=RECORDS.find(x=>x.id===editingId);if(r){r.note=document.getElementById('editNote').value.trim();persistRecords();renderSaved();}document.getElementById('editModal').classList.remove('show');editingId=null;};

/* EXPORT EXCEL */
document.getElementById('exportBtn').onclick=()=>{
  if(RECORDS.length===0)return;
  const sum=RECORDS.map((r,i)=>({
    'ลำดับ':i+1,
    'วันที่บันทึก':fmtDate(r.ts),
    'เส้นทาง':r.stops.map(s=>s.name).join(' → '),
    'จุดเริ่มต้น':r.stops[0]?r.stops[0].name:'',
    'จุดสิ้นสุด':r.stops[r.stops.length-1]?r.stops[r.stops.length-1].name:'',
    'จำนวนจุด':r.stops.length,
    'ระยะทางรวม (กม.)':r.totalKm,
    'หมายเหตุ':r.note||'',
    'ผู้บันทึก':r.by||'admin'
  }));
  const legs=[];
  RECORDS.forEach((r,i)=>{r.legs.forEach((l,j)=>{legs.push({
    'รหัสบันทึก':i+1,'วันที่':fmtDate(r.ts),'ช่วงที่':j+1,'จาก':l.from,'ไป':l.to,'ระยะ (กม.)':l.km
  });});});
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(sum);
  ws1['!cols']=[{wch:6},{wch:18},{wch:50},{wch:22},{wch:22},{wch:10},{wch:16},{wch:25},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws1,'สรุประยะทาง');
  const ws2=XLSX.utils.json_to_sheet(legs);
  ws2['!cols']=[{wch:10},{wch:18},{wch:8},{wch:28},{wch:28},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'รายละเอียดแต่ละช่วง');
  // ชีตรายชื่อสาขาทั้งหมด (อ้างอิง)
  const blist=DATA.map(b=>({'รหัส':b.code,'ชื่อสาขา':b.name,'ชื่อ (EN)':b.name_en,'จังหวัด':b.prov||'','ภูมิภาค':regName(b.region),'LATITUDE':b.lat,'LONGITUDE':b.lng,'ที่อยู่':b.addr||''}));
  const ws3=XLSX.utils.json_to_sheet(blist);
  ws3['!cols']=[{wch:8},{wch:24},{wch:24},{wch:16},{wch:18},{wch:12},{wch:12},{wch:55}];
  XLSX.utils.book_append_sheet(wb,ws3,'รายชื่อสาขาทั้งหมด');
  const d=new Date();const fn=`MAKRO_Distance_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb,fn);
};

/* ============================================================
   SUMMARY
============================================================ */
function renderSummary(){
  const total=DATA.length;
  const provs=new Set(DATA.map(b=>b.prov).filter(Boolean)).size;
  const regCount={};Object.keys(REGIONS).forEach(k=>regCount[k]=0);
  DATA.forEach(b=>{if(regCount[b.region]!=null)regCount[b.region]++;});
  const maxReg=Math.max(...Object.values(regCount),1);
  const avgSaved=RECORDS.length?(RECORDS.reduce((s,r)=>s+r.totalKm,0)/RECORDS.length):0;
  let h=`<div class="kpis">
    <div class="kpi red"><div class="v">${total}</div><div class="l">${t('kpiTotal')}</div></div>
    <div class="kpi blue"><div class="v">${provs}</div><div class="l">${t('kpiProv')}</div></div>
    <div class="kpi gold"><div class="v">${RECORDS.length}</div><div class="l">${t('kpiSaved')}</div></div>
    <div class="kpi green"><div class="v">${avgSaved.toFixed(0)}</div><div class="l">${t('kpiAvg')} (${t('km')})</div></div>
  </div><div class="sum-sec"><h3>${t('byRegion')}</h3>`;
  for(const k of Object.keys(REGIONS)){const c=regCount[k];
    h+=`<div class="bar-row" data-reg="${k}"><div class="bar-label"><span>${regName(k)}</span><span class="n">${c} ${t('branches')}</span></div><div class="bar-track"><div class="bar-fill" style="width:${c/maxReg*100}%;background:${REGIONS[k].color}"></div></div></div>`;}
  h+=`</div><button class="print-btn" onclick="window.print()">${t('print')}</button>`;
  document.getElementById('summary').innerHTML=h;
  document.querySelectorAll('.bar-row[data-reg]').forEach(r=>{r.onclick=()=>{switchPane('map');activeRegion=r.dataset.reg;renderRegions();renderList();zoomToRegion(r.dataset.reg);closeMobile();};});
}

/* ============================================================
   NAV
============================================================ */
function switchPane(p){
  currentPane=p;
  document.getElementById('paneMap').classList.toggle('hide',p!=='map');
  document.getElementById('paneRoute').classList.toggle('hide',p!=='route');
  document.getElementById('paneSaved').classList.toggle('hide',p!=='saved');
  document.getElementById('paneSum').classList.toggle('hide',p!=='sum');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.pane===p));
  if(p==='sum')renderSummary();if(p==='route')renderRoutePlan();if(p==='saved')renderSaved();
}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>switchPane(b.dataset.pane));
const sidebar=document.getElementById('sidebar'),scrim=document.getElementById('scrim');
document.getElementById('mtoggle').onclick=()=>{sidebar.classList.add('open');scrim.classList.add('show');};
function closeMobile(){sidebar.classList.remove('open');scrim.classList.remove('show');}
scrim.onclick=closeMobile;

/* ============================================================
   LANGUAGE
============================================================ */
function applyI18nStatic(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  document.documentElement.lang=LANG;
}
function setLang(l){
  LANG=l;ls_set('makro_lang',l);
  document.querySelectorAll('#langSw button,#loginLang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  applyI18nStatic();addLegend();addRouteCtl();
  renderRegions();buildMarkers();renderList();renderRoutePlan();renderSaved();
  if(currentPane==='sum')renderSummary();
  const on=document.getElementById('syncBadge').classList.contains('on');
  setSync(on,on?t('online'):t('offline'));
}
document.querySelectorAll('#langSw button,#loginLang button').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));

/* ============================================================
   FIREBASE
============================================================ */
function setSync(on,txt){const b=document.getElementById('syncBadge');b.classList.toggle('on',on);document.getElementById('syncTxt').textContent=txt;}
function initFirebase(){
  if(FIREBASE_CONFIG.apiKey==="YOUR_API_KEY"){setSync(false,t('offline'));loadLocalRecords();renderSaved();return;}
  try{
    firebase.initializeApp(FIREBASE_CONFIG);db=firebase.database();fbReady=true;
    db.ref(DB_BRANCHES).on('value',snap=>{
      const v=snap.val();
      if(v&&Array.isArray(v)&&v.length)DATA=v;
      else if(v&&typeof v==='object')DATA=Object.values(v);
      else{db.ref(DB_BRANCHES).set(DEFAULT_BRANCHES);DATA=JSON.parse(JSON.stringify(DEFAULT_BRANCHES));}
      setSync(true,t('online'));buildMarkers();renderList();if(currentPane==='sum')renderSummary();
    },e=>{console.warn(e);setSync(false,t('offErr'));});
    db.ref(DB_RECORDS).on('value',snap=>{
      const v=snap.val();RECORDS=v&&Array.isArray(v)?v:(v&&typeof v==='object'?Object.values(v):[]);
      RECORDS.sort((a,b)=>b.ts-a.ts);renderSaved();if(currentPane==='sum')renderSummary();
    });
  }catch(e){console.warn(e);setSync(false,t('offErr'));loadLocalRecords();renderSaved();}
}

/* ============================================================
   BOOT
============================================================ */
applyI18nStatic();
document.querySelectorAll('#langSw button,#loginLang button').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));
addLegend();addRouteCtl();renderRegions();buildMarkers();renderList();
loadLocalRecords();renderSaved();
initFirebase();
